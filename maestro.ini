; ==========================================================================
; maestro.ini — Master configuration for Project Maestro
; ==========================================================================
;
; This file controls all tuneable settings for the Maestro agent system,
; the Wiggum Loop, the intake pipeline, the scheduler, and safety limits.
;
; SYNTAX
; ------
; Standard INI format.  Comments start with ; or #.  Inline comments are
; supported.  Values are stripped of surrounding whitespace.
;
; OVERRIDE ORDER (highest wins)
; -----------------------------
;   1. Environment variables   (e.g.  MAESTRO_LLM_BASE_URL=...)
;   2. This file               (maestro.ini in the project root)
;   3. Built-in defaults       (hardcoded in app/agent/config.py)
;
; Environment variables use the MAESTRO_ prefix.  The variable name for
; each setting is noted in the comment above it.
;
; After editing this file, restart the Maestro server for changes to take
; effect.  No hot-reload — by design, to avoid mid-run config drift.
;
; ==========================================================================


; --------------------------------------------------------------------------
[database]
; --------------------------------------------------------------------------
; Database connection settings.
; Maestro supports SQLite (default) and PostgreSQL (recommended for scale).

; Toggle between PostgreSQL and SQLite.
; If true, MAESTRO_DATABASE_URL and MAESTRO_ADMIN_DATABASE_URL must be
; provided in your .env file or environment variables.
; If false, falls back to local SQLite at data/kanban.db.
; Env: MAESTRO_USE_POSTGRES
use_postgres = false

; --------------------------------------------------------------------------
[llm]
; --------------------------------------------------------------------------
; Default LLM endpoint used when a task has no LLM record assigned.
; In normal operation every task should have an explicit LLM assigned via
; the board UI, so these act as fallbacks only.

; Base URL for the OpenAI-compatible chat/completions API.
; Must include the /v1 path segment if the server expects it.
; Env: MAESTRO_LLM_BASE_URL
base_url = http://localhost:8008/v1

; Model identifier sent in the "model" field of every request payload.
; Must match the model name the server expects.
; Env: MAESTRO_LLM_MODEL
model = omnicoder-9b

; Maximum tokens the LLM may generate per single response.
; This is the per-turn cap, not the total context budget.
; Env: MAESTRO_MAX_TOKENS
max_tokens_per_turn = 32768

; HTTP timeout in seconds for each LLM request.  If the server doesn't
; respond within this window the call raises a timeout error.
; Env: MAESTRO_LLM_TIMEOUT
timeout_seconds = 1800


; --------------------------------------------------------------------------
[search]
; --------------------------------------------------------------------------
; Settings for the web_search tool.

; Preferred search provider.  Options: duckduckgo, brave, tavily.
; Env: MAESTRO_SEARCH_PROVIDER
provider = tavily

; API key for Brave Search.  Only required if provider = brave.
; Env: BRAVE_API_KEY
brave_api_key = 

; API key for Tavily Search.  Only required if provider = tavily.
; Env: TAVILY_API_KEY
tavily_api_key =



; --------------------------------------------------------------------------
[loop]
; --------------------------------------------------------------------------
; Settings for the Wiggum Loop — the Do-While engine that drives a single
; task through ORIENT → PLAN → IMPLEMENT → TEST → VERIFY.

; Hard cap on agent turns before the loop terminates with MAX_TURNS status.
; One "turn" = one LLM call → tool dispatch → result cycle.
; Env: MAESTRO_MAX_TURNS
max_turns = 200

; Number of consecutive tool errors (or LLM call failures) before the loop
; emits REVERT_TO_DESIGN and halts.
max_consecutive_errors = 3

; Number of full task-level retries (loop restarts) before giving up.
max_task_retries = 3


; --------------------------------------------------------------------------
[shell]
; --------------------------------------------------------------------------
; Settings for the run_shell() tool available to agents.

; Hard timeout in seconds for any single shell command.
; Commands exceeding this are killed.
; Env: MAESTRO_SHELL_TIMEOUT
timeout_seconds = 300


; --------------------------------------------------------------------------
[paths]
; --------------------------------------------------------------------------
; Filesystem paths used by the agent subsystem.

; Project root directory.  All file operations are confined to this tree.
; Leave blank to auto-detect (two directories above app/agent/config.py).
; Env: MAESTRO_PROJECT_ROOT
project_root =

; Subdirectory (relative to project_root) where soft-deleted files are
; archived by archive_file().  Never hard-deletes — always moves here.
archive_dir = .archive


; --------------------------------------------------------------------------
[git]
; --------------------------------------------------------------------------
; Git safety settings.

; Branch prefix for all agent work.  Agents are only allowed to create and
; operate on branches starting with this prefix.
branch_prefix = maestro/task-

; Base branches the agent is allowed to checkout (in addition to branches
; matching the prefix above).  Comma-separated.
allowed_base_branches = main, master


; --------------------------------------------------------------------------
[intake]
; --------------------------------------------------------------------------
; Settings for the IDEA → PLANNING intake pipeline and its voting system.

; Maximum number of sequential research agent "lives" when a stage votes
; NEEDS_RESEARCH.  Each life is a fresh LLM conversation seeded with the
; previous life's findings.
; Env: MAESTRO_RESEARCH_LIVES
research_agent_max_lives = 3

; Maximum agentic turns per research agent life.  One "turn" = one LLM call
; → tool dispatch → result cycle.  Applies to both run_research and run_tiebreaker.
research_agent_max_turns = 150

; Fraction of context window allocated to research agent (0.0 – 1.0).
; Env: MAESTRO_INTAKE_CONTEXT_BUDGET_RATIO
context_budget_ratio = 0.60

; Enable the tie-breaker research agent.  When votes split evenly, a
; tie-breaker agent investigates with all voter context and casts a
; deciding vote.  Set to false to leave ties unresolved.
tiebreaker_enabled = true

; Comma-separated list of tools the research agent is allowed to use.
; These are read-only tools only — no write or delete access.
research_agent_tools = read_file, read_file_metadata,
    read_last_output, find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks,
    web_search,
    submit_work

; --------------------------------------------------------------------------
[capacity]
; --------------------------------------------------------------------------
; Hard limits on per-LLM-endpoint capacity values.  These constrain what
; users can enter in the LLM Endpoints configuration screen.

; Minimum and maximum parallel batched sessions per LLM endpoint.
; These are the bounds for the parallel_sessions field in the llms table.
min_parallel_sessions = 1
max_parallel_sessions = 1024

; Minimum and maximum context window size (in tokens) per LLM endpoint.
; max = 2 megatokens (2 * 1024 * 1024 = 2097152).
min_context_size = 1
max_context_size = 2097152


; --------------------------------------------------------------------------
[context_warnings]
; --------------------------------------------------------------------------
; When the MaestroLoop is running, cumulative token usage is tracked against
; the LLM's max_context.  At configurable thresholds, a warning message is
; injected into the conversation telling the LLM to wrap up.
;
; Each warning fires at most once per session.  Thresholds are evaluated in
; ascending order.

; Master switch.  Set to false to disable all context warnings.
enabled = true

; Threshold at 50% of max_context.  Leave the message blank to skip this
; threshold while keeping others active.
warn_at_50_enabled = true
warn_at_50_message = [SYSTEM WARNING] You have used approximately 50%% of your available context window.  Begin planning to conclude your current line of work within the remaining capacity.

; Threshold at 75% of max_context.
warn_at_75_enabled = true
warn_at_75_message = [SYSTEM WARNING] You have used approximately 75%% of your available context window.  Prioritise completing your current task.  Avoid starting new exploratory work.  Wrap up tool calls and summarise findings.

; Threshold at 90% of max_context.
warn_at_90_enabled = true
warn_at_90_message = [SYSTEM CRITICAL] You have used approximately 90%% of your available context window.  Immediately produce your final output in the required format.  Do not make additional tool calls unless absolutely necessary.  Your generation will be terminated shortly.

; Hard-terminate threshold: agents break their turn loop when saturation reaches this.
; Prevents 400 context-overflow errors.  Set to 0 to disable hard termination.
terminate_threshold = 0.95


; --------------------------------------------------------------------------
[scheduler]
; --------------------------------------------------------------------------
; The push-first eager scheduler.  Runs as a background thread, ticking
; every N seconds to discover DAG-ready tasks and dispatch them to
; available LLM slots.

; How often (seconds) the scheduler checks for ready tasks.
tick_interval = 5.0

; Maximum silence (seconds) between consecutive SSE tokens before treating the
; LLM as stuck and aborting the file-summary call.  File summaries use streaming
; so this clock only runs during active generation — queue wait and backoff
; sleeps do NOT count.
file_summary_stream_idle_timeout = 30

; Absolute safety-net timeout (seconds) for wait_for_completion on a file
; summary job.  Covers queue wait + total generation across all chunks.
; With streaming idle timeout catching stuck LLMs, 300s (5 minutes) is a
; reasonable middle ground.
file_summary_wait_timeout = 600

; Master switch.  Set to false to disable automatic task dispatch entirely.
; Tasks can still be launched manually via the API.
; NOTE: Leave disabled until you have LLM endpoints running, otherwise the
; scheduler will attempt to dispatch tasks and log connection errors.
enabled = true

; Task types the scheduler will auto-dispatch.  Comma-separated.
; Default covers intake (idea), planning, and in-dev stages.
dispatchable_types = idea, planning, indev, conceptual_review, optimization, security, final_review


; --------------------------------------------------------------------------
[research_jobs]
; --------------------------------------------------------------------------
; Settings for background research jobs dispatched by the scheduler and
; inline research triggered by NEEDS_RESEARCH signals in MaestroLoop.

; Maximum concurrent research jobs per scheduler tick.
max_concurrent = 3

; Timeout in seconds before a running research job is considered stuck.
timeout_seconds = 300

; Priority penalty per DAG depth level.  A task at depth 2 gets
; 2 * depth_penalty added to its priority score (lower = higher priority).
depth_penalty = 10.0


; --------------------------------------------------------------------------
[subdivision]
; --------------------------------------------------------------------------
; Settings for recursive task decomposition when the intake pipeline
; returns SUBDIVIDE_IDEA.

; Maximum agentic turns for the subdivision agent conversation loop.
max_turns = 150

; Maximum recursion depth.  A value of 6 means: human idea -> up to 6 levels
; of recursive subdivision.
max_depth = 6

; Maximum number of re-subdivision attempts per level when system-generated
; sub-ideas fail intake.  After this many retries the parent reverts to IDEA.
max_retries_per_level = 4

; Hard cap on the total number of sub-ideas across all levels of recursion.
; Prevents combinatorial explosion if every sub-idea gets further subdivided.
max_total_sub_ideas = 30

; Fraction of context window allocated to subdivision agent (0.0 – 1.0).
context_budget_ratio = 0.60

; Adapt tool set based on project content (true = greenfield gets planning
; tools only; false = always provide full codebase tools).
context_aware_tools = true

; Comma-separated list of tools the subdivision agent is allowed to use.
; Same read-only set as the research agent.
subdivision_agent_tools = read_file, read_file_metadata,
    read_last_output, find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks,
    web_search

; Planning tools available to the subdivision agent for greenfield projects.
subdivision_planning_tools = write_arch_doc, write_interface_contract,
    write_mermaid, spawn_research_agent,
    list_directory, find_files, get_task, list_tasks,
    web_search


; --------------------------------------------------------------------------
[verdicts]
; --------------------------------------------------------------------------
; Confidence ranges for each intake verdict.  These define the mapping from
; a numeric confidence score (0–100) to a verdict category.
;
; Format:  verdict = min, max   (inclusive bounds)
;
; The ranges must be contiguous and cover 0–100 with no gaps or overlaps.

rejected       = 0, 50
not_suitable   = 51, 60
needs_research = 61, 75
possible       = 76, 91
likely         = 92, 100


; --------------------------------------------------------------------------
[planning]
; --------------------------------------------------------------------------
; Settings for the PLANNING stage pipeline — Best-of-N design generation,
; review panel, pitfall detection, and plan consolidation.

; Number of parallel design proposals to generate.
best_of_n = 5

; Max tokens for the design judge call. Reasoning models need headroom for chain-of-thought.
judge_max_tokens = 32768

; Maximum retries when the design review panel rejects a design.
max_design_retries = 3

; Maximum agentic turns for the codebase survey phase.
survey_max_turns = 150

; Maximum implementation steps allowed in a plan before the gate forces subdivision.
; Default 6 is too low for test tasks that enumerate one step per test class/scenario.
max_steps = 10





; --------------------------------------------------------------------------
[planning_gate]
; --------------------------------------------------------------------------
; Settings for the PLANNING → IN DEV transition gate (7-check due diligence).

; Enable the LLM-based feasibility re-check (check #6).
feasibility_recheck_enabled = true

; Safety margin for context budget check: each step must fit within
; max_context * (1 - this value).
context_safety_margin = 0.15


; --------------------------------------------------------------------------
[indev]
; --------------------------------------------------------------------------
; Settings for the IN DEVELOPMENT stage (component-level agents).

; Maximum agentic turns per component agent.
component_max_turns = 200

; Maximum retries per failed component before halting.
component_max_retries = 2

; Enforce per-component file write containment via ComponentToolDispatcher.
enforce_file_containment = true

; Comma-separated list of tools available to in-development component agents.
agent_tools = read_file, read_file_metadata, read_last_output,
    write_file, append_file, patch_file, move_file, list_directory,
    find_in_files, find_files, find_symbol, find_callers, find_imports_of, write_archive,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show, read_diff_stat,
    write_git_branch, write_git_commit, write_git_checkout, write_git_restore,
    get_task, list_tasks, write_task_status, write_task_history,
    write_arch_doc, write_mermaid, write_interface_contract,
    spawn_research_agent, write_benchmark,
    run_test_pytest, run_check_mypy, run_check_ruff, run_check_black, run_test_unittest,
    run_test_npm, run_test_cargo, run_test_go, read_test_summary,
    run_build_make, run_build_cargo, run_build_go, run_build_npm, run_build_tsc,
    run_build_gradle, run_build_mvn,
    run_deps_pip, run_deps_npm, run_deps_cargo,
    submit_work


; --------------------------------------------------------------------------
[conceptual_review]
; --------------------------------------------------------------------------
; Settings for the CONCEPTUAL REVIEW stage (10-voter panel).

; Maximum number of research agent lives when a reviewer votes NEEDS_RESEARCH.
research_agent_max_lives = 3

; Maximum agentic turns per LLM reviewer.
reviewer_max_turns = 150

; If true, CRITICAL-severity findings block advancement. HIGH-severity findings
; are recorded as advisory warnings but do not block the card.
high_severity_blocks_advance = true

; Tools available to each conceptual reviewer (read-only).
reviewer_tools = read_file, read_file_metadata, read_last_output,
    find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks, submit_work


; --------------------------------------------------------------------------
[optimization]
; --------------------------------------------------------------------------
; Settings for the OPTIMIZATION stage (profile → propose → vote → implement → verify).

; Number of parallel optimization proposals.
proposal_count = 5

; Number of parallel judges to evaluate proposals.
judge_count = 3

; Maximum agentic turns for the implementation agent.
implementation_max_turns = 200

; Minimum net improvement (%) to accept an optimization.
min_improvement_pct = 2.0

; Maximum metric regression (%) allowed before rejecting.
max_regression_pct = 5.0

; Maximum agentic turns for profiling/proposer/judge mini-loops.
reviewer_max_turns = 150

; Tools available to optimization reviewer agents (read-only).
reviewer_tools = read_file, read_file_metadata, read_last_output,
    find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks


; --------------------------------------------------------------------------
[optimization_weights]
; --------------------------------------------------------------------------
; Relative importance of each resource (higher = more precious).
; Improvements in higher-weight metrics contribute more to the final score.
compute_weight = 1.0
memory_weight = 0.6
storage_weight = 0.3

; A readability_cost of 1.0 (completely unreadable) reduces improvement score by this fraction.
readability_penalty_max = 0.5

; If is_premature=true in benchmark metrics, require this multiplier x min_improvement_pct
; before accepting the optimization.
premature_multiplier = 2.0

; Bonus improvement percentage if tech_debt_resolved=true in benchmark metrics.
tech_debt_bonus_pct = 1.0

; Bonus improvement % credited per Big O class rank improvement
; (e.g., O(n^2) rank=5 to O(n) rank=3 = 2 ranks x 10.0 = 20% bonus).
big_o_bonus_pct = 10.0


; --------------------------------------------------------------------------
[security_review]
; --------------------------------------------------------------------------
; Settings for the SECURITY CONSIDERATIONS stage (3-agent veto-power gate).

; If true, a single security reviewer can block advancement.
veto_power = true

; Maximum lives for the security research agent.
research_agent_max_lives = 2

; Maximum agentic turns per security reviewer.
reviewer_max_turns = 150

; Tools available to each security reviewer.
reviewer_tools = read_file, read_file_metadata, read_last_output,
    find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks,
    run_audit_bandit, run_audit_pip, run_audit_semgrep, run_audit_npm,
    web_search, submit_work


; --------------------------------------------------------------------------
[final_review]
; --------------------------------------------------------------------------
; Settings for the FINAL REVIEW stage (AI stage before human approval).

; Automatically include UX reviewer if frontend files changed.
auto_ux_review = true

; Glob patterns for frontend files (triggers UX reviewer).
frontend_patterns = app/web/*.html, app/web/*.js, app/web/*.css

; Maximum lives for the final review research agent.
research_agent_max_lives = 2

; Maximum agentic turns per reviewer.
reviewer_max_turns = 20

; Tools available to code quality and integration reviewers.
code_quality_reviewer_tools = read_file, read_file_metadata, read_last_output,
    find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks, submit_work,
    run_test_pytest, run_check_mypy, run_check_ruff, run_check_black, read_test_summary

; Tools available to functional reviewers.
functional_reviewer_tools = read_file, read_file_metadata, read_last_output,
    find_in_files, find_files, list_directory,
    read_git_status, read_git_diff, read_git_log, read_git_blame, read_git_show,
    get_task, list_tasks, submit_work


; --------------------------------------------------------------------------
[merge]
; --------------------------------------------------------------------------
; Settings for the COMPLETED stage (deterministic git merge to main).

; Timeout in seconds for the full test suite after merge.
test_timeout = 300

; Automatically push to origin after successful merge and tests.
auto_push = true

; Tag merged branches with merged/task-{id}.
tag_merged_branches = true

; Delete merged branches after successful merge.
delete_merged_branches = false

; Number of push retry attempts after a successful local merge.
; Uses exponential backoff: 2s, 4s, 8s, ...
push_retries = 3


; --------------------------------------------------------------------------
[maestro]
; Autonomous project orchestrator and resurrection agent — fires when a project
; has had no pipeline activity for stall_ticks consecutive scheduler ticks.
; Surveyed failing tasks are cloned/mutated or queued for research so the
; project keeps progressing without manual intervention.

; Master switch.  Set to true to enable.  Disabled by default.
; Env: MAESTRO_ORCHESTRATOR_ENABLED
enabled = true
; Number of scheduler ticks with no pipeline TransitionResult before a
; project is considered stalled.  With tick_interval=5s, 60 ticks = 5 min.
stall_ticks = 60

; Maximum number of failing cards to clone / mutate per run.
max_cards_to_resurrect = 3

; Maximum number of brand-new idea cards to generate per run.
max_new_cards = 2

; Max completion tokens for the single Decide LLM call.
decide_max_tokens = 32768

; Tools available to the Maestro agent when in survey mode.
survey_tools = get_project_summary, get_directory_summary, get_module_summary, list_scope_summaries


; --------------------------------------------------------------------------
[pip]
; --------------------------------------------------------------------------
; Settings for the Performance Improvement Plan system.

; Hard cap on agentic turns for a PIP Resolution Agent session.
resolution_max_turns = 150


; --------------------------------------------------------------------------
[correction]
; --------------------------------------------------------------------------
; Settings for the PlanningCorrectionAgent — inter-stage gate repair.

; Hard cap on agentic turns for a correction agent session.
max_turns = 150

; Skip correction and go straight to full re-plan after this many cumulative
; correction attempts on the active planning result.
correction_skip_after_failures = 2


; --------------------------------------------------------------------------
[pipeline]
; --------------------------------------------------------------------------
; Canonical column/stage order for the Maestro pipeline.
; Used for advancement detection, priority tie-breaking, and display ordering.
; Changing this order affects agent scheduling priority and UI ordering.
column_order = architecture, idea, planning, indev, conceptual_review, optimization, security, final_review, human_review, completed

; Task type values that are considered "done" for DAG prerequisite resolution.
; A task in any of these states satisfies the prerequisite check for tasks
; that depend on it.
done_statuses = completed, accepted


; --------------------------------------------------------------------------
[snapshot]
; --------------------------------------------------------------------------
; Project file-structure snapshot injected into every agent's initial context.

; Maximum directory depth to traverse.  Depth 0 = project root files only.
; With depth=4 the tree visits: root(0) → app/(1) → agent/(2) → subdir/(3) → files(4).
max_depth = 4

; Token budget for the snapshot when the LLM's context window is unknown.
; When the LLM's max_context IS known, the budget is computed dynamically as
; max_context * context_ratio instead — this value acts as a fallback only.
max_tokens = 32768

; Fraction of the LLM's max_context to allocate to the snapshot.
; Applied at call sites that know the LLM context window (loop, research, subdivide).
; 0.12 = 12% — for a 100k-token LLM that's 12 000 tokens; for 200k it's 24 000.
context_ratio = 0.12

; How long (seconds) a built snapshot stays in the in-process cache.
; After expiry the snapshot is rebuilt to pick up new/changed file summaries.
cache_ttl_seconds = 300


; --------------------------------------------------------------------------
[tools]
; --------------------------------------------------------------------------
; Limits and exclusions for the agent file/search/git tools.

; Maximum number of results returned by search_files and find_files before
; truncation.  Higher values give more complete results but larger responses.
max_search_results = 200

; Maximum number of git log entries an agent may request via git_log.
; Requests above this are silently clamped.
max_git_log_entries = 100

; Timeout in seconds for all git subprocess calls (separate from the shell
; tool timeout, which covers run_shell commands).
git_timeout_seconds = 30

; Comma-separated directory *basenames* excluded from list_directory AUTO-EXCLUDED
; labels, find_files, search_files, and walk_safe.
; NOTE: 'logs' is intentionally NOT listed here.  Log directories are visible in
; listings and can be read manually by agents.  They are excluded from automatic
; summarization by the size cap (max_file_size_bytes), not by directory exclusion.
excluded_directories = .archive, .git, venv, .venv, __pycache__, node_modules, .mypy_cache, .pytest_cache, .ruff_cache, dist, build, .eggs

; --------------------------------------------------------------------------
[survey]
; --------------------------------------------------------------------------
; Fraction of max_context allocated to a single summary block.
; At 10%, 8 max-size summaries consume 80% leaving 20% for response.
summary_context_ratio = 0.10
; Max tokens for the one-word staleness verdict call (FULL_REINGEST / EDIT_SUMMARY / NO_CHANGE).
; Must be high enough for thinking models that burn tokens in their reasoning chain.
verdict_max_tokens = 32768
; Max tokens for summary generation and edit calls.
summary_max_tokens = 32768
staleness_enabled = true
staleness_check_ratio = 0.05
max_concurrent_scope_jobs = 3
; Max files per directory before splitting into sub-directory summary pages
directory_max_files = 100
; Target file count for LLM-assigned module groupings
module_target_files = 30

; --------------------------------------------------------------------------
[logging]
; --------------------------------------------------------------------------
; Logging configuration for the Maestro server.

; Log level: DEBUG, INFO, WARNING, ERROR
level = INFO

; Path to the rotating log file (relative to project root).
; Leave blank to disable file logging (stdout only).
log_file = logs/maestro.log

; Maximum size of a single log file before rotation (bytes).
; Default: 10 MiB
max_bytes = 10485760

; Number of rotated backup files to keep.
backup_count = 5

; --------------------------------------------------------------------------
[arch_gen]
; --------------------------------------------------------------------------
; Max tokens for the arch card generation LLM call.
; Thinking models consume tokens in their reasoning chain before writing content,
; so this must be large enough to cover both thinking and the card body.
max_tokens = 32768


; --------------------------------------------------------------------------
[monitor]
; --------------------------------------------------------------------------
; Settings for the MCP monitor tool (maestro__monitor).
; These are the defaults used when Claude calls monitor() with no arguments.
; All values can be overridden per-call by passing explicit parameters.

; How long (seconds) each monitor() call blocks before returning its report.
; 300 = 5 minutes, which is the recommended /loop cadence.
; Env: MAESTRO_MONITOR_DURATION
duration_seconds = 300

; How often (seconds) the monitor polls the database within the window.
; Lower values give finer event granularity at the cost of more DB reads.
; Env: MAESTRO_MONITOR_POLL_INTERVAL
poll_interval_seconds = 30

; --- Pattern detection thresholds ---

; Sliding window (seconds) used for the rapid_cycling detector.
; A task with >= rapid_cycling_min_entries cheap calls within this window is flagged.
rapid_cycling_window_seconds = 90

; Minimum number of cheap entries within the window to flag rapid cycling.
rapid_cycling_min_entries = 3

; Maximum prompt_cost (tokens) for a call to count as "cheap" for rapid cycling.
rapid_cycling_max_prompt_cost = 700

; Minutes of LLM silence before an open session is flagged as a zombie.
zombie_idle_minutes = 10

; Tool-call entries per minute threshold for tool_call_storm detection.
; Survey and planning phases naturally burst at 4-8 calls/min. 2.0 was too
; aggressive and generated false positives on all healthy planning sessions.
tool_call_storm_rate = 5.0

; Minimum tool-call entries before the storm rate is evaluated.
tool_call_storm_min_entries = 3


; --------------------------------------------------------------------------
[custom_agent]
; --------------------------------------------------------------------------
; Settings for CustomLLMAgent — DB-driven agents defined via the Agent
; Definitions UI (/agents).  Stage-level overrides (stage_config.config)
; always win; definition-level values beat these defaults.

; Hard cap on agent turns when neither the stage config nor the definition
; specifies a max_turns value.  Matches [loop] max_turns so that custom
; agents behave consistently with built-in agents by default.
; Env: MAESTRO_CUSTOM_AGENT_DEFAULT_MAX_TURNS
default_max_turns = 200


; --------------------------------------------------------------------------
[server]
; --------------------------------------------------------------------------
; Server admin controls.

; Enable the POST /api/admin/restart endpoint and the MCP restart_server tool.
