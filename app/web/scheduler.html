<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scheduler Status — TheMaestro</title>
    <link rel="stylesheet" href="/static/style.css?v=24">
    <link rel="stylesheet" href="/static/diagnostics.css?v=19">
    <style>
        /* ── Layout ─────────────────────────────────────────────────── */
        .sched-body { background: #f0f2f5; }

        .sched-workspace {
            padding: 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ── Status bar ─────────────────────────────────────────────── */
        .sched-status-bar {
            display: flex;
            align-items: center;
            gap: 1.2rem;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 0.75rem 1.1rem;
            font-size: 0.84rem;
            flex-wrap: wrap;
        }
        .sched-indicator {
            display: flex;
            align-items: center;
            gap: 0.45rem;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .sched-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #adb5bd;
        }
        .sched-dot.running { background: #28a745; box-shadow: 0 0 6px #28a74588; }
        .sched-dot.stopped { background: #dc3545; }
        .sched-pill {
            background: #f1f3f5;
            border: 1px solid #dee2e6;
            border-radius: 20px;
            padding: 0.2rem 0.65rem;
            color: #495057;
            white-space: nowrap;
        }
        .sched-pill span { font-weight: 600; color: #212529; }
        .sched-pill.alert span { color: #d63031; }

        /* ── LLM capacity section ───────────────────────────────────── */
        .sched-section-title {
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            color: #868e96;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        .sched-llm-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }
        .sched-llm-card {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 0.65rem 0.9rem;
            min-width: 160px;
            flex: 1 1 160px;
            max-width: 240px;
        }
        .sched-llm-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: #212529;
            margin-bottom: 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sched-llm-bar-wrap {
            background: #e9ecef;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 0.3rem;
        }
        .sched-llm-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: #0d6efd;
            transition: width 0.4s ease;
        }
        .sched-llm-bar-fill.full { background: #dc3545; }
        .sched-llm-bar-fill.busy { background: #fd7e14; }
        .sched-llm-counts {
            font-size: 0.74rem;
            color: #868e96;
        }
        .sched-llm-counts span { color: #212529; font-weight: 600; }

        /* ── Three-column task grid ─────────────────────────────────── */
        .sched-cols {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1rem;
        }
        @media (max-width: 900px) { .sched-cols { grid-template-columns: 1fr; } }

        .sched-col {
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
        }
        .sched-col-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.9rem;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            border-bottom: 2px solid #dee2e6;
        }
        .sched-col-header.active  { background: #e8f5e9; border-bottom-color: #28a745; color: #155724; }
        .sched-col-header.queued  { background: #fff3cd; border-bottom-color: #ffc107; color: #856404; }
        .sched-col-header.blocked { background: #fdecea; border-bottom-color: #dc3545; color: #721c24; }

        .sched-col-count {
            background: rgba(0,0,0,0.1);
            border-radius: 20px;
            padding: 0.1rem 0.55rem;
            font-size: 0.78rem;
        }

        .sched-col-body {
            padding: 0.6rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-height: 60px;
            max-height: calc(100vh - 340px);
            overflow-y: auto;
        }

        /* ── Task cards ─────────────────────────────────────────────── */
        .sched-task {
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 0.55rem 0.7rem;
            font-size: 0.82rem;
            background: #fafafa;
            transition: box-shadow 0.15s;
        }
        .sched-task:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .sched-task.is-active { border-left: 3px solid #28a745; background: #f6fef8; }
        .sched-task.is-queued { border-left: 3px solid #ffc107; }
        .sched-task.is-blocked { border-left: 3px solid #dc3545; background: #fff8f8; }

        .sched-task-title {
            font-weight: 600;
            color: #212529;
            margin-bottom: 0.3rem;
            line-height: 1.3;
            word-break: break-word;
        }
        .sched-task-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.3rem;
            align-items: center;
        }
        .sched-badge {
            border-radius: 4px;
            padding: 0.1rem 0.45rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
        }
        .sched-badge.type-idea            { background: #6c757d; }
        .sched-badge.type-planning        { background: #0d6efd; }
        .sched-badge.type-indev           { background: #198754; }
        .sched-badge.type-conceptual_review { background: #20c997; }
        .sched-badge.type-optimization    { background: #fd7e14; }
        .sched-badge.type-human_review     { background: #6f42c1; }
        .sched-badge.type-file_summary    { background: #17a2b8; }
        .sched-badge.type-other           { background: #adb5bd; }

        .sched-badge.reason-pending    { background: #28a745; }
        .sched-badge.reason-at_capacity { background: #fd7e14; }
        .sched-badge.reason-cooldown   { background: #dc3545; }
        .sched-badge.reason-no_llm     { background: #6c757d; }

        .sched-task-project {
            font-size: 0.7rem;
            color: #868e96;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        .sched-task-llm {
            font-size: 0.7rem;
            color: #495057;
            background: #e9ecef;
            border-radius: 3px;
            padding: 0.1rem 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 140px;
        }

        .sched-task-prereqs {
            margin-top: 0.4rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
        }
        .sched-prereq-pill {
            font-size: 0.66rem;
            background: #fdecea;
            border: 1px solid #f5c6cb;
            border-radius: 3px;
            padding: 0.1rem 0.4rem;
            color: #721c24;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sched-empty {
            color: #adb5bd;
            font-size: 0.82rem;
            text-align: center;
            padding: 1rem 0;
        }

        /* ── Refresh indicator ──────────────────────────────────────── */
        .sched-refresh-age {
            font-size: 0.75rem;
            color: #adb5bd;
            margin-left: auto;
        }
        .sched-refreshing { color: #0d6efd; }

        /* ── Pulse animation for active tasks ───────────────────────── */
        @keyframes sched-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .sched-pulse-dot {
            display: inline-block;
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #28a745;
            animation: sched-pulse 1.4s ease-in-out infinite;
            vertical-align: middle;
            margin-right: 4px;
        }
    </style>
</head>
<body class="diag-body sched-body">

    <!-- Header -->
    <div class="diag-header">
        <div class="diag-header-left">
            <a href="/" class="diag-back-btn">&larr; Board</a>
            <h1 class="diag-title">Scheduler Status</h1>
            <a href="/diagnostics" class="diag-back-btn" style="margin-left:0.5rem;">LLM Diagnostics</a>
        </div>
        <div class="diag-header-right">
            <a href="/tail.html" class="diag-back-btn" style="margin-right:0.5rem;">Session Tail</a>
            <span id="refresh-age" class="sched-refresh-age">refreshing…</span>
            <button class="diag-refresh-btn" onclick="fetchStatus()">&#8635; Refresh</button>
        </div>
    </div>

    <div class="sched-workspace">

        <!-- Status bar -->
        <div class="sched-status-bar">
            <div class="sched-indicator">
                <div id="sched-dot" class="sched-dot"></div>
                <span id="sched-label">Checking…</span>
            </div>
            <div class="sched-pill">Tick <span id="tick-interval">—</span>s</div>
            <div class="sched-pill" id="pill-research">Research jobs <span id="pending-research">—</span></div>
            <div class="sched-pill" id="pill-summaries">File summaries <span id="pending-summaries">—</span></div>
            <div class="sched-pill">Pinned LLM <span id="pinned-llm">none</span></div>
        </div>

        <!-- LLM capacities -->
        <div id="llm-section">
            <div class="sched-section-title">LLM Capacities</div>
            <div class="sched-llm-grid" id="llm-grid">
                <span class="sched-empty">—</span>
            </div>
        </div>

        <!-- Three columns -->
        <div class="sched-cols">

            <div class="sched-col">
                <div class="sched-col-header active">
                    <span><span class="sched-pulse-dot"></span> Active</span>
                    <span class="sched-col-count" id="count-active">0</span>
                </div>
                <div class="sched-col-body" id="col-active">
                    <p class="sched-empty">No active sessions.</p>
                </div>
            </div>

            <div class="sched-col">
                <div class="sched-col-header queued">
                    <span>Queued</span>
                    <span class="sched-col-count" id="count-queued">0</span>
                </div>
                <div class="sched-col-body" id="col-queued">
                    <p class="sched-empty">Queue is empty.</p>
                </div>
            </div>

            <div class="sched-col">
                <div class="sched-col-header blocked">
                    <span>Blocked</span>
                    <span class="sched-col-count" id="count-blocked">0</span>
                </div>
                <div class="sched-col-body" id="col-blocked">
                    <p class="sched-empty">No blocked tasks.</p>
                </div>
            </div>

        </div>
    </div>

    <script src="/static/scheduler.js?v=1"></script>
</body>
</html>
